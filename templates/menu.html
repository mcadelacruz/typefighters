{% extends "base.html" %}

{% block content %}
<div>
    <div class="menu-title">typefighters</div>
    <button class="menu-link mode-toggle" id="play-mode-toggle" type="button" aria-expanded="false" aria-controls="mode-submenu">play</button>
    <div id="mode-submenu" class="mode-submenu" hidden>
        <div class="mode-submenu-title">choose mode</div>
        <a class="menu-link mode-link" href="{{ url_for('play') }}?mode=classic">classic</a>
        <a class="menu-link mode-link" href="{{ url_for('play') }}?mode=meltdown">meltdown</a>
        <a class="menu-link mode-link" href="{{ url_for('play') }}?mode=flow-state">flow state</a>
        <a class="menu-link mode-link" href="{{ url_for('play') }}?mode=interference">interference</a>
        <a class="menu-link mode-link" href="{{ url_for('play') }}?mode=overload">overload</a>
    </div>
    <a class="menu-link" href="{{ url_for('about') }}">about</a>
    <a class="menu-link" href="{{ url_for('highscores') }}">high scores</a>
</div>
{% endblock %}

{% block floating %}
<a id="main-player-name-link" class="player-name-link" href="{{ url_for('play') }}?change_name=1">set player name</a>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    const toggle = document.getElementById('play-mode-toggle');
    const submenu = document.getElementById('mode-submenu');
    if (!toggle || !submenu) return;

    toggle.addEventListener('click', function () {
        const isOpen = !submenu.hasAttribute('hidden');
        if (isOpen) {
            submenu.setAttribute('hidden', 'hidden');
            toggle.setAttribute('aria-expanded', 'false');
            return;
        }

        submenu.removeAttribute('hidden');
        toggle.setAttribute('aria-expanded', 'true');
    });
});
</script>
{% endblock %}
