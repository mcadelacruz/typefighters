<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>typefighters</title>
    <link href="https://fonts.googleapis.com/css?family=Fira+Mono:400,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=20260419d">
    <style>
    /* function for the slide-fade-in animation */
    #transition-blank {
        position: fixed;
        z-index: 9999;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: #000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    #transition-blank.active {
        opacity: 1;
        pointer-events: all;
    }
    .slide-fade-in {
        animation: slideFadeIn 1s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    </style>
    {% block style_overrides %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <div id="boot-loader" aria-hidden="true">
        <div class="boot-loader-inner">
            <div class="boot-logo" aria-label="typefighters loading animation">
                <span class="boot-prefix">type </span>
                <span class="boot-word-slot">
                    <span class="boot-word-old">it paster</span>
                    <span class="boot-word-new">fighters</span>
                </span>
            </div>
            <div class="boot-progress-track">
                <div class="boot-progress-fill"></div>
            </div>
        </div>
    </div>
    {% block screen_fx %}{% endblock %}
    <div id="page-root">
        <div class="center-root">
            <div class="center-content">
                {% block content %}{% endblock %}
            </div>
        </div>
        {% block floating %}{% endblock %}
    </div>
    <div id="transition-blank"></div>
    {% block scripts %}{% endblock %}
    <script src="{{ url_for('static', filename='main.js') }}?v=20260418d"></script>
</body>
</html>
